<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>ATS Dashboard - Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* THEME VARIABLES */

:root{
--bg:linear-gradient(135deg,#eef2ff,#fdf4ff,#ecfeff);
--sidebar:linear-gradient(180deg,#4f46e5,#7c3aed);
--card:rgba(255,255,255,0.75);
--text:#1f2937;
--muted:#6b7280;
--accent:#7c3aed;
}

body.dark{
--bg:#0f172a;
--sidebar:linear-gradient(180deg,#020617,#0f172a);
--card:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
--accent:#a78bfa;
}

body{
display:flex;
height:100vh;
background:var(--bg);
transition:0.3s;
color:var(--text);
}

/* SIDEBAR */

.sidebar{
width:240px;
background:var(--sidebar);
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:40px;
}

.menu a{
display:block;
text-decoration:none;
color:#e5e7eb;
padding:12px;
border-radius:10px;
margin-bottom:10px;
transition:0.3s;
}

.menu a:hover{
background:rgba(255,255,255,0.15);
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h2{
color:var(--text);
}

.toggle{
padding:8px 16px;
border:none;
border-radius:20px;
background:var(--accent);
color:white;
cursor:pointer;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:25px;
border-radius:16px;
background:var(--card);
color:var(--text);
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card p{
color:var(--muted);
}

.card h3{
margin-top:8px;
font-size:28px;
color:var(--accent);
}

/* CHARTS */

.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.chart-box{
background:var(--card);
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.chart-box h3{
margin-bottom:15px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">ATS</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="#">Applicants</a>
<a href="#">Resume Analyzer</a>
<a href="interviews.html">Interviews</a>
<a href="analytics.html">Analytics</a>
<a href="#">Settings</a>
</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<div class="topbar">

<h2>Analytics</h2>

<button class="toggle" onclick="toggleTheme()">🌙 Dark</button>

</div>

<!-- STATS CARDS -->

<div class="cards">

<div class="card">
<p>Total Applicants</p>
<h3>132</h3>
</div>

<div class="card">
<p>Shortlisted</p>
<h3>48</h3>
</div>

<div class="card">
<p>Interviews</p>
<h3>24</h3>
</div>

<div class="card">
<p>Hired</p>
<h3>6</h3>
</div>

</div>

<!-- CHARTS -->

<div class="charts">

<div class="chart-box">
<h3>Applications Per Job</h3>
<canvas id="jobChart"></canvas>
</div>

<div class="chart-box">
<h3>Hiring Pipeline</h3>
<canvas id="pipelineChart"></canvas>
</div>

<div class="chart-box">
<h3>Monthly Applications</h3>
<canvas id="monthlyChart"></canvas>
</div>

<div class="chart-box">
<h3>Interview Success Rate</h3>
<canvas id="successChart"></canvas>
</div>

</div>

</div>

<script>

/* DARK MODE */

function toggleTheme(){
document.body.classList.toggle("dark");
}

/* CHART 1 */

new Chart(document.getElementById("jobChart"),{
type:'bar',
data:{
labels:['Frontend','Backend','UI/UX','Data','DevOps'],
datasets:[{
label:'Applications',
data:[35,28,20,25,12],
backgroundColor:'#7c3aed'
}]
}
});

/* CHART 2 */

new Chart(document.getElementById("pipelineChart"),{
type:'doughnut',
data:{
labels:['Applied','Shortlisted','Interviewed','Hired'],
datasets:[{
data:[132,48,24,6],
backgroundColor:['#6366f1','#8b5cf6','#a78bfa','#22c55e']
}]
}
});

/* CHART 3 */

new Chart(document.getElementById("monthlyChart"),{
type:'line',
data:{
labels:['Jan','Feb','Mar','Apr','May','Jun'],
datasets:[{
label:'Applications',
data:[40,55,70,65,90,110],
borderColor:'#7c3aed',
tension:0.4,
fill:false
}]
}
});

/* CHART 4 */

new Chart(document.getElementById("successChart"),{
type:'pie',
data:{
labels:['Selected','Rejected'],
datasets:[{
data:[6,18],
backgroundColor:['#22c55e','#ef4444']
}]
}
});

</script>

</body>
</html>
